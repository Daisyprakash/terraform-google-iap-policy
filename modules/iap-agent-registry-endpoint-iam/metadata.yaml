apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-iap-policy-iap-agent-registry-endpoint-iam
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: IAP Agent Registry Endpoint IAM Binding
    source:
      repo: https://github.com/Daisyprakash/terraform-google-iap-policy.git
      sourceType: git
      dir: /modules/iap-agent-registry-endpoint-iam
    version: 0.0.2
    actuationTool:
      flavor: Terraform
      version: ">= 0.13"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: iap_web_iam_binding
        location: examples/iap_web_iam_binding
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
      - name: location
        description: The location of the resource.
        varType: string
        required: true
      - name: endpoint_id
        description: The ID of the Agent Registry Endpoint.
        varType: string
        required: true
    outputs:
      - name: etag
        description: Etag of the IAM policy
      - name: policy_data
        description: The policy data generated by a google_iam_policy data source.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google-nightly
        version: 2026.3.26-7.25.0
