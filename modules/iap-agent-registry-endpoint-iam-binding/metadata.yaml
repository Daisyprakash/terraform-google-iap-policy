apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: iap-agent-registry-endpoint-iam-binding
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: IAP Agent Registry Endpoint IAM Binding
    source:
      repo: /
    actuationTool:
      flavor: Terraform
      version: ">= 0.13"
    description: {}
  content: {}
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
      - name: location
        description: The location of the resource.
        varType: string
      - name: endpoint_id
        description: The ID of the Agent Registry endpoint.
        varType: string
        required: true
      - name: role
        description: The role that should be applied. E.g., roles/iap.egressor.
        varType: string
        required: true
      - name: members
        description: Identities that will be granted the privilege in the role.
        varType: list(string)
        required: true
      - name: condition
        description: An optional IAM Condition for the binding.
        varType: |-
          object({
              title       = string
              description = optional(string)
              expression  = string
            })
    outputs:
      - name: etag
        description: The etag of the IAM binding.
